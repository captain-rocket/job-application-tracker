services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/preflight-homelab.sh"]
    environment:
      DB_USER: ${DB_USER:?Set DB_USER in backend/.env.homelab}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in backend/.env.homelab}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in backend/.env.homelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env.homelab}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in backend/.env.homelab}
    volumes:
      - homelab-pgdata:/var/lib/postgresql
      - ./db/preflight.homelab.sh:/usr/local/bin/preflight-homelab.sh:ro
      - ./db/init.homelab.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:?Set NODE_ENV in backend/.env.homelab}
      DB_HOST: ${DB_HOST:?Set DB_HOST in backend/.env.homelab}
      DB_PORT: ${DB_PORT:?Set DB_PORT in backend/.env.homelab}
      DB_USER: ${DB_USER:?Set DB_USER in backend/.env.homelab}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in backend/.env.homelab}
      DB_NAME: ${DB_NAME:?Set DB_NAME in backend/.env.homelab}
      DB_SSL: ${DB_SSL:?Set DB_SSL in backend/.env.homelab}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:?Set DB_SSL_REJECT_UNAUTHORIZED in backend/.env.homelab}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in backend/.env.homelab}
      PORT: ${PORT:?Set PORT in backend/.env.homelab}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  homelab-pgdata:
