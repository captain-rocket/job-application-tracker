name: Backend CI/CD

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:
jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Backend
        run: npm run build

      - name: Run Tests Backend
        run: npm test

  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'workflow_dispatch'

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_PORT: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH }}

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Validate deployment settings
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USERNAME"
          test -n "$DEPLOY_PATH"

      - name: Add EC2 host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend container
        run: |
          ssh -p "$EC2_PORT" "$EC2_USERNAME@$EC2_HOST" "bash -s" <<EOF_REMOTE
          set -euo pipefail


          cd "$DEPLOY_PATH"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          docker build -t job-tracker-api ./backend
          docker rm -f job-tracker-api || true
          docker run -d \
            -p 4000:4000 \
            --env-file ./backend/.env \
            --restart unless-stopped \
            --name job-tracker-api \
            job-tracker-api

          for attempt in 1 2 3 4 5; do
            if curl --silent --show-error --fail http://localhost:4000/health; then
              exit 0
            fi

            sleep 3
          done

          exit 1
          EOF_REMOTE
